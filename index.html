<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알바성향코드 테스트 — 이야기하는 자람나무</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: #1a1a1a; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .prog-label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
  .prog-bar { height: 3px; background: #e0e0e0; border-radius: 2px; margin-bottom: 1.5rem; }
  .prog-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width 0.3s; }
  .q-card { background: #fff; border: 1px solid #ebebeb; border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; }
  .q-group { font-size: 11px; color: #aaa; margin-bottom: 4px; letter-spacing: 0.3px; }
  .q-text { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 1rem; line-height: 1.5; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn { background: #f7f7f5; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #333; cursor: pointer; text-align: left; line-height: 1.45; transition: background 0.12s; font-family: inherit; }
  .btn:hover { background: #eee; }
  .btn.on { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
  .submit { background: #0F6E56; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; width: 100%; margin-top: 0.75rem; font-family: inherit; }
  .submit:disabled { background: #ccc; color: #fff; cursor: not-allowed; }
  .result-card { background: #fff; border: 1px solid #ebebeb; border-radius: 12px; padding: 1.75rem; }
  .r-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .r-code { font-size: 44px; font-weight: 700; color: #0F6E56; letter-spacing: 6px; margin-bottom: 4px; }
  .r-name { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; }
  .r-desc { font-size: 14px; color: #555; line-height: 1.75; margin-bottom: 1.25rem; }
  .r-jobs-box { background: #f7f7f5; border-radius: 8px; padding: 14px 16px; margin-bottom: 1.25rem; }
  .r-jobs-label { font-size: 11px; color: #aaa; margin-bottom: 6px; }
  .r-jobs-text { font-size: 13px; color: #333; line-height: 1.75; }
  .r-sub { margin-bottom: 0.75rem; }
  .r-sub:last-child { margin-bottom: 0; }
  .r-sub-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; }
  .r-sub-jobs { font-size: 13px; color: #666; line-height: 1.7; }
  .divider { height: 1px; background: #ebebeb; margin: 1.25rem 0; }
  .retry { background: transparent; border: 1px solid #ddd; border-radius: 8px; padding: 10px 20px; font-size: 13px; color: #888; cursor: pointer; font-family: inherit; }
  .retry:hover { background: #f7f7f5; }
  .hidden { display: none; }
  .footer { text-align: center; font-size: 12px; color: #bbb; margin-top: 2rem; line-height: 1.7; }
  @media (max-width: 420px) {
    .choices { grid-template-columns: 1fr; }
    .r-code { font-size: 36px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>알바성향코드 테스트</h1>
  <p class="subtitle">9개 질문으로 나에게 맞는 알바 유형을 확인해보세요.</p>

  <div id="test-sec">
    <div class="prog-label" id="prog-label">1 / 9</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:11%"></div></div>
    <div id="q-wrap"></div>
    <button class="submit" id="submit-btn" disabled onclick="showResult()">결과 확인하기</button>
  </div>

  <div id="result-sec" class="hidden">
    <div class="result-card">
      <div class="r-label">나의 알바성향코드</div>
      <div class="r-code" id="r-code"></div>
      <div class="r-name" id="r-name"></div>
      <div class="r-desc" id="r-desc"></div>
      <div id="r-stamina" style="font-size:13px;color:#888;margin-bottom:1rem;"></div>
      <div id="r-jobs-wrap"></div>
      <div class="divider"></div>
      <button class="retry" onclick="reset()">다시 하기</button>
    </div>
  </div>

  <div class="footer">
    ⓒ 이야기하는 자람나무 | 직접 제작한 콘텐츠입니다.<br>
    퍼가기는 언제든 환영합니다. 단, 무단 도용은 정중히 사양합니다.
  </div>
</div>

<script>
const QS = [
  {axis:'P', group:'대면 · 비대면', q:'처음 보는 손님이나 고객을 응대하는 일이라면?', a:['별로 안 힘들다, 익숙하다','솔직히 피곤하다, 혼자가 편하다'], v:['P','N']},
  {axis:'P', group:'대면 · 비대면', q:'퇴근 후 부업을 고른다면?', a:['카페·편의점 등 사람 상대하는 일','배달·경비 등 혼자 하는 일'], v:['P','N']},
  {axis:'P', group:'대면 · 비대면', q:'모르는 사람과 대화를 이어가는 게?', a:['어렵지 않다, 금방 편해진다','에너지가 많이 든다'], v:['P','N']},
  {axis:'A', group:'이동 · 고정', q:'일하는 동안 돌아다니는 것이?', a:['오히려 좋다, 가만히 있으면 답답하다','힘들다, 한 자리에 있는 게 편하다'], v:['A','S']},
  {axis:'A', group:'이동 · 고정', q:'하루 종일 앉아서 일한다면?', a:['집중도 잘 되고 편하다','몸이 쑤시고 답답하다'], v:['S','A']},
  {axis:'A', group:'이동 · 고정', q:'걷거나 이동하며 하는 일이라면?', a:['괜찮다, 적응된다','체력 소모가 너무 크다'], v:['A','S']},
  {axis:'Y', group:'야간 · 주간', q:'저녁 9시 이후에 일을 시작해야 한다면?', a:['크게 거부감 없다','몸이 안 따라준다, 힘들다'], v:['Y','D']},
  {axis:'Y', group:'야간 · 주간', q:'새벽 1~2시에 퇴근하는 일이라면?', a:['할 수 있다, 수당도 되니까','건강에 무리다, 안 된다'], v:['Y','D']},
  {axis:'Y', group:'야간 · 주간', q:'아침 일찍 vs 야간, 나에게 맞는 시간대는?', a:['야간이 오히려 편하다','아침·낮이 맞다'], v:['Y','D']},
];

const TYPES = {
  PAY:{name:'야간 대면 이동형', stamina:'높음', desc:'밤에 사람을 상대하며 돌아다니는 일이 잘 맞는 성향입니다. 체력 소모가 크지만 그만큼 활기 있는 환경에서 일하는 걸 즐기는 타입입니다.', jobs:null, jobsLabel:'해당 알바', jobsText:'야간 홀서빙, 주점·포장마차 서빙, 웨딩홀 저녁 연회'},
  PAD:{name:'주간 대면 이동형', stamina:'중간', desc:'낮에 사람을 응대하며 매장·현장을 돌아다니는 성향입니다. 가만히 앉아 있으면 오히려 더 힘든 타입입니다.', jobs:null, jobsLabel:'해당 알바', jobsText:'점심 홀서빙, 대형마트 판매·진열, 패스트푸드점, 행사·이벤트 스태프'},
  PSY:{name:'야간 대면 고정형', stamina:'낮음', desc:'야간에 한 자리에서 손님을 응대하는 성향입니다. 수면 패턴이 야간형인 분께 잘 맞습니다.', jobs:null, jobsLabel:'해당 알바', jobsText:'24시간 편의점 야간, 야간 카운터·계산원'},
  PSD:{name:'주간 대면 고정형', stamina:'낮음', desc:'낮에 한 자리에서 사람을 응대하는 성향입니다. 붙임성 좋으면 유리하고, 40~50대 여성이 많이 찾는 유형입니다.', jobs:null, jobsLabel:'해당 알바', jobsText:'카페·음료점, 편의점(주간), 약국 보조, 학원 보조·채점, 사무보조·행정, 콜센터 상담원, 요양보호사·가사도우미'},
  NAY:{name:'야간 비대면 이동형', stamina:'높음', desc:'밤·새벽에 혼자 움직이며 일하는 성향입니다. 대리운전은 40~60대 남성 비중이 특히 높은 대표적인 야간 이동형 알바입니다.', jobs:null, jobsLabel:'해당 알바', jobsText:'대리운전, 택배 상하차(새벽), 물류센터 야간 분류·소분, 야간 배달'},
  NAD:{name:'주간 비대면 이동형', stamina:'직종마다 다름', desc:'낮에 혼자 몸을 쓰며 일하는 성향입니다. 40~60대 남성이 가장 많이 분포하는 유형으로, 기술·체력·이동 세 가지로 나뉩니다.',
    jobs:[
      {t:'기술형 (체력 중상 / 일당 높음)', j:'건설 기능직(배관·전기·미장·목공·철근), 도배·장판 시공, 조경·산림 작업, 시설관리 수리·점검, 용접·도장'},
      {t:'체력형 (체력 높음 / 진입 쉬움)', j:'건설 일용직(조공·잡부), 인력사무소 단순노무, 이삿짐 운반, 주방보조·설거지, 환경미화·청소'},
      {t:'이동형 (체력 보통 / 이동 많음)', j:'오토바이·자전거 배달, 쿠팡플렉스·차량배송, 퀵서비스, 전단지 배포'},
    ], jobsLabel:null, jobsText:null},
  NSY:{name:'야간 비대면 고정형', stamina:'낮음', desc:'밤에 혼자 조용히 자리를 지키는 성향입니다. 체력보다 책임감이 중요하고 50~60대 남성 비중이 높습니다.', jobs:null, jobsLabel:'해당 알바', jobsText:'건물·아파트 야간 경비, 주차관리(야간), 재택 야간 고객상담'},
  NSD:{name:'주간 비대면 고정형', stamina:'낮음', desc:'낮에 혼자 조용히 반복적인 일을 처리하는 성향입니다. 50~60대가 가장 많이 안착하는 유형입니다.', jobs:null, jobsLabel:'해당 알바', jobsText:'아파트·건물 주간 경비, 시설관리·설비 점검, 주차관리(주간), 재택 고객상담, 공장 포장·조립(경량)'},
};

let ans = {};

function build(){
  const w = document.getElementById('q-wrap');
  w.innerHTML = '';
  QS.forEach((q,i)=>{
    const d = document.createElement('div');
    d.className = 'q-card';
    d.innerHTML = `<div class="q-group">${q.group}</div><div class="q-text">${q.q}</div><div class="choices" id="ch-${i}"><button class="btn" onclick="pick(${i},0)">${q.a[0]}</button><button class="btn" onclick="pick(${i},1)">${q.a[1]}</button></div>`;
    w.appendChild(d);
  });
}

function pick(qi,ci){
  ans[qi] = QS[qi].v[ci];
  document.querySelectorAll(`#ch-${qi} .btn`).forEach((b,i)=>b.classList.toggle('on',i===ci));
  const n = Object.keys(ans).length;
  document.getElementById('prog-label').textContent = n+' / 9';
  document.getElementById('prog-fill').style.width = Math.round(n/9*100)+'%';
  document.getElementById('submit-btn').disabled = n < 9;
}

function calcCode(){
  const s={P:0,N:0,A:0,S:0,Y:0,D:0};
  Object.values(ans).forEach(v=>s[v]++);
  return (s.P>=s.N?'P':'N')+(s.A>=s.S?'A':'S')+(s.Y>=s.D?'Y':'D');
}

function showResult(){
  const code = calcCode();
  const t = TYPES[code]||TYPES['NSD'];
  document.getElementById('r-code').textContent = code;
  document.getElementById('r-name').textContent = t.name;
  document.getElementById('r-desc').textContent = t.desc;
  const staminaColor = {높음:'#b94040', 중간:'#b97a00', 낮음:'#1D9E75', '직종마다 다름':'#5a5a8a'};
  const sc = staminaColor[t.stamina]||'#888';
  document.getElementById('r-stamina').innerHTML = `체력 부담 <span style="color:${sc};font-weight:600">${t.stamina}</span>`;
  const jw = document.getElementById('r-jobs-wrap');
  if(t.jobs){
    jw.innerHTML = '<div class="r-jobs-box">'+t.jobs.map(j=>`<div class="r-sub"><div class="r-sub-title">${j.t}</div><div class="r-sub-jobs">${j.j}</div></div>`).join('')+'</div>';
  } else {
    jw.innerHTML = `<div class="r-jobs-box"><div class="r-jobs-label">${t.jobsLabel}</div><div class="r-jobs-text">${t.jobsText}</div></div>`;
  }
  document.getElementById('test-sec').classList.add('hidden');
  document.getElementById('result-sec').classList.remove('hidden');
  window.scrollTo(0,0);
}

function reset(){
  ans={};
  document.getElementById('prog-label').textContent='1 / 9';
  document.getElementById('prog-fill').style.width='11%';
  document.getElementById('submit-btn').disabled=true;
  build();
  document.getElementById('test-sec').classList.remove('hidden');
  document.getElementById('result-sec').classList.add('hidden');
  window.scrollTo(0,0);
}

build();
</script>
</body>
</html>
